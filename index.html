<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranking de Produtividade — BRRJ02</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ml-yellow:     #FFE600;
  --ml-yellow-dk:  #F0D800;
  --ml-blue:       #2D3277;
  --ml-blue-lt:    #3D3F9F;
  --green:         #2e7d32;
  --green-lt:      #e8f5e9;
  --green-bar:     #43a047;
  --amber:         #e65100;
  --amber-lt:      #fff3e0;
  --amber-bar:     #fb8c00;
  --red:           #c62828;
  --red-lt:        #ffebee;
  --red-bar:       #e53935;
  --gray:          #757575;
  --gray-lt:       #f5f5f5;
  --purple:        #3730a3;
  --purple-bg:     #312e81;
  --bg:            #f0f2f5;
  --surface:       #ffffff;
  --border:        #e0e0e0;
  --text:          #1a1a1a;
  --muted:         #757575;
  --sans: 'Inter', sans-serif;
}

body { font-family: var(--sans); background: var(--bg); color: var(--text); font-size: 13px; min-height: 100vh; }

.topbar {
  background: var(--ml-yellow);
  padding: 0 24px;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 2px solid var(--ml-yellow-dk);
  position: sticky;
  top: 0;
  z-index: 20;
}
.topbar-logo { display: flex; align-items: center; gap: 10px; }
.ml-logo-text { font-size: 18px; font-weight: 800; color: var(--ml-blue); letter-spacing: -0.5px; line-height: 1; }
.ml-logo-text span { color: var(--ml-blue-lt); }
.topbar-section { font-size: 12px; font-weight: 600; color: var(--ml-blue); background: rgba(45,50,119,0.12); padding: 4px 12px; border-radius: 20px; letter-spacing: 0.2px; }

.breadcrumb { padding: 9px 24px; font-size: 12px; color: var(--muted); background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 5px; }
.breadcrumb a { color: var(--ml-blue-lt); text-decoration: none; font-weight: 500; }
.breadcrumb a:hover { text-decoration: underline; }
.breadcrumb .sep { color: #ccc; }
.breadcrumb .current { color: var(--text); font-weight: 600; }

.page-header { background: var(--surface); padding: 18px 24px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; gap: 16px; }
.site-badge { background: var(--ml-blue); color: var(--ml-yellow); font-size: 13px; font-weight: 800; padding: 6px 12px; border-radius: 6px; letter-spacing: 1px; white-space: nowrap; margin-top: 3px; flex-shrink: 0; }
.page-title { font-size: 22px; font-weight: 800; color: var(--text); line-height: 1.2; letter-spacing: -0.4px; }
.page-subtitle { font-size: 12px; color: var(--muted); margin-top: 4px; font-weight: 500; }

.sector-tabs { padding: 14px 24px; display: flex; gap: 0; background: var(--surface); border-bottom: 1px solid var(--border); }
.sector-btn { padding: 8px 20px; font-size: 13px; font-weight: 600; border: 1.5px solid var(--border); cursor: pointer; background: var(--surface); color: var(--muted); white-space: nowrap; font-family: var(--sans); transition: all 0.15s; }
.sector-btn:first-child { border-radius: 8px 0 0 8px; }
.sector-btn:last-child  { border-radius: 0 8px 8px 0; border-left: none; }
.sector-btn .meta-tag { font-size: 10px; font-weight: 500; color: var(--muted); margin-left: 5px; }
.sector-btn.active { background: var(--ml-blue); color: var(--ml-yellow); border-color: var(--ml-blue); }
.sector-btn.active .meta-tag { color: #a5b4fc; }

.summary-row { display: flex; gap: 10px; padding: 16px 24px; overflow-x: auto; background: var(--bg); }
.summary-row::-webkit-scrollbar { display: none; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; min-width: 110px; flex: 1; border-top: 3px solid var(--border); }
.card-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.7px; color: var(--muted); margin-bottom: 8px; }
.card-val { font-size: 30px; font-weight: 800; line-height: 1; margin-bottom: 5px; letter-spacing: -1px; }
.card-sub { font-size: 11px; color: var(--muted); font-weight: 500; }
.card-val.c-default { color: var(--text); }
.card-val.c-green   { color: var(--green); }
.card-val.c-amber   { color: var(--amber); }
.card-val.c-red     { color: var(--red); }
.card-val.c-gray    { color: var(--gray); }
.card-val.c-blue    { color: var(--purple); }
.card.border-green  { border-top-color: var(--green-bar); }
.card.border-amber  { border-top-color: var(--amber-bar); }
.card.border-red    { border-top-color: var(--red-bar); }
.card.border-gray   { border-top-color: #bdbdbd; }
.card.border-blue   { border-top-color: var(--purple); }

.filter-tabs { display: flex; padding: 0 24px; background: var(--surface); border-bottom: 2px solid var(--border); overflow-x: auto; }
.filter-tabs::-webkit-scrollbar { display: none; }
.ftab { padding: 12px 18px; font-size: 13px; font-weight: 600; color: var(--muted); cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -2px; white-space: nowrap; user-select: none; transition: color 0.15s; }
.ftab .ftab-count { display: inline-block; background: #eeeeee; color: var(--muted); border-radius: 12px; padding: 1px 8px; font-size: 11px; font-weight: 700; margin-left: 5px; }
.ftab.active { color: var(--ml-blue); border-bottom-color: var(--ml-yellow); }
.ftab.active .ftab-count { background: var(--ml-blue); color: var(--ml-yellow); }

.search-legend { display: flex; align-items: center; gap: 20px; padding: 10px 24px; background: var(--surface); border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.search-box { display: flex; align-items: center; gap: 8px; border: 1.5px solid var(--border); border-radius: 8px; padding: 7px 12px; min-width: 230px; background: var(--bg); transition: border-color 0.15s; }
.search-box:focus-within { border-color: var(--ml-blue); }
.search-box svg { flex-shrink: 0; color: var(--muted); }
.search-box input { border: none; background: transparent; font-family: var(--sans); font-size: 12px; color: var(--text); outline: none; width: 100%; }
.search-box input::placeholder { color: #aaa; }
.legend-items { display: flex; gap: 16px; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); white-space: nowrap; font-weight: 500; }
.ldot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

.table-wrap { padding: 0 24px 32px; overflow-x: auto; }
table { width: 100%; border-collapse: collapse; margin-top: 8px; }
thead th { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); padding: 10px 14px; border-bottom: 2px solid var(--border); text-align: left; white-space: nowrap; background: var(--bg); }
th.right, td.right { text-align: right; }
td { padding: 0; border-bottom: 1px solid var(--border); vertical-align: middle; }
.td-inner { padding: 12px 14px; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #FFFDE7; }

.rank-badge { width: 30px; height: 30px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; flex-shrink: 0; }
.rank-1 { background: var(--ml-yellow); color: var(--ml-blue); }
.rank-2 { background: #C0C0C0; color: #fff; }
.rank-3 { background: #CD7F32; color: #fff; }
.rank-n { background: #eeeeee; color: #999; font-weight: 600; font-size: 11px; }

.prod-wrap { display: flex; align-items: center; gap: 10px; }
.prod-bar-bg { width: 120px; height: 8px; border-radius: 4px; background: #e5e7eb; flex-shrink: 0; }
.prod-bar-fill { height: 8px; border-radius: 4px; }
.prod-val { font-size: 14px; font-weight: 800; min-width: 28px; letter-spacing: -0.5px; }
.prod-badge { display: inline-flex; align-items: center; gap: 3px; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; white-space: nowrap; }
.pb-meta  { background: var(--green-lt); color: var(--green); }
.pb-attn  { background: var(--amber-lt); color: var(--amber); }
.pb-below { background: var(--red-lt);   color: var(--red); }

.util-val { font-size: 13px; font-weight: 700; }
.util-green { color: var(--green); }
.util-amber { color: var(--amber); }
.util-red   { color: var(--red); }
.util-gray  { color: var(--gray); }

.row-meta td { background: #F0FFF6 !important; }
.row-meta:hover td { background: #E6F7EE !important; }
.empty-msg { text-align: center; padding: 2rem; color: var(--muted); font-style: italic; }

/* ── MOBILE CARDS ── */
.mobile-list { display: none; padding: 0 12px 32px; }
.mcard {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 10px;
  padding: 12px 14px;
  display: flex;
  align-items: flex-start;
  gap: 12px;
}
.mcard.row-meta { background: #F0FFF6; border-left: 3px solid var(--green-bar); }
.mcard-rank { flex-shrink: 0; margin-top: 2px; }
.mcard-body { flex: 1; min-width: 0; }
.mcard-id { font-size: 16px; font-weight: 800; color: var(--text); margin-bottom: 8px; }
.mcard-bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.mcard-bar-bg { flex: 1; height: 7px; border-radius: 4px; background: #e5e7eb; }
.mcard-bar-fill { height: 7px; border-radius: 4px; }
.mcard-prod-val { font-size: 15px; font-weight: 800; min-width: 28px; }
.mcard-meta-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.mcard-stat { display: flex; flex-direction: column; }
.mcard-stat-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 1px; }
.mcard-stat-val { font-size: 13px; font-weight: 700; }
.mcard-divider { width: 1px; height: 28px; background: var(--border); }

/* nome column */
.td-nome { font-size: 13px; font-weight: 600; color: #333; }
.td-id   { font-size: 11px; color: var(--muted); font-weight: 500; margin-top: 2px; }

@media (max-width: 640px) {
  .topbar { padding: 0 14px; height: 48px; }
  .ml-logo-text { font-size: 15px; }
  .topbar-section { font-size: 10px; padding: 3px 8px; }
  .breadcrumb { display: none; }
  .page-header { padding: 12px 14px 14px; gap: 10px; }
  .page-title { font-size: 17px; }
  .site-badge { font-size: 11px; padding: 5px 9px; }
  .sector-tabs { padding: 10px 14px; }
  .sector-btn { padding: 7px 14px; font-size: 12px; }
  .summary-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 12px 14px; }
  .card { min-width: unset; padding: 10px 12px; }
  .card-val { font-size: 24px; }
  .card-label { font-size: 9px; margin-bottom: 4px; }
  .card-sub { font-size: 10px; }
  .filter-tabs { padding: 0 14px; }
  .ftab { padding: 10px 12px; font-size: 12px; }
  .ftab .ftab-count { padding: 1px 6px; font-size: 10px; }
  .search-legend { padding: 8px 14px; gap: 8px; }
  .search-box { min-width: unset; width: 100%; }
  .legend-items { gap: 10px; }
  .legend-item { font-size: 10px; }
  .table-wrap { display: none; }
  .mobile-list { display: block; }
}
</style>
</head>

    <input type="text" id="search-input" placeholder="Buscar colaborador...">
  </div>
  <div class="legend-items">
    <span class="legend-item"><span class="ldot" style="background:var(--green-bar)"></span><span id="legend-meta">≥ 67 — meta</span></span>
    <span class="legend-item"><span class="ldot" style="background:var(--amber-bar)"></span><span id="legend-attn">54–66 — atenção</span></span>
    <span class="legend-item"><span class="ldot" style="background:var(--red-bar)"></span><span id="legend-below">&lt; 54 — abaixo</span></span>
    <span class="legend-item"><span class="ldot" style="background:#bdbdbd"></span>sem produção</span>
  </div>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th style="width:50px;">#</th>
        <th>COLABORADOR</th>
        <th>PROD. LÍQUIDA (UN/H)</th>
        <th class="right" style="width:130px;">UTILIZAÇÃO</th>
        <th class="right" style="width:110px;">UNIDADES</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>
<div class="mobile-list" id="mobile-list"></div>

<script>
const META_RK = 67;

const raw = [
  {id:2027462, nome:"Anthony Aleixo Viegas Da Rocha", prod_liq:0, util:0.0, unidades:0},
  {id:2027343, nome:"Cleide Dias Da Silva", prod_liq:0, util:0.0, unidades:0},
  {id:2194272, nome:"Davi Galvao Marques", prod_liq:0, util:0.0, unidades:0},
  {id:2210943, nome:"Julia Da Silva Ribeiro", prod_liq:0, util:0.0, unidades:0},
  {id:548992, nome:"Cesar De Farias Firmino", prod_liq:81, util:59.81, unidades:250},
  {id:2027348, nome:"Cristiano Gaiao Breda", prod_liq:0, util:0.0, unidades:0},
  {id:2241968, nome:"Edilson Da Silva Santos", prod_liq:71, util:63.83, unidades:138},
  {id:2148524, nome:"Fabricio Barradas Santos", prod_liq:75, util:57.21, unidades:154},
  {id:1921712, nome:"Gabriel Pinto Goncalves", prod_liq:83, util:67.2, unidades:259},
  {id:2027474, nome:"Germano Aziz De Moura Junior", prod_liq:74, util:62.85, unidades:233},
  {id:2027315, nome:"Guilherme Mateus Lisboa Soares", prod_liq:54, util:48.47, unidades:167},
  {id:2139922, nome:"Jenifer Teles Da Silva", prod_liq:85, util:66.89, unidades:306},
  {id:2126576, nome:"Daniel Borges Da Silva", prod_liq:57, util:55.3, unidades:69},
  {id:1805739, nome:"Marcos Vinicios Saldanha Da Silva", prod_liq:68, util:56.36, unidades:117},
  {id:2242089, nome:"Maria Eduarda Santos Da Silva Da Conceicao", prod_liq:71, util:70.81, unidades:258},
  {id:1921713, nome:"Matheus Clemente De Sena", prod_liq:63, util:70.39, unidades:176},
  {id:2126588, nome:"Nathalia Do Rosario Bastos Oliveira", prod_liq:110, util:75.81, unidades:398},
  {id:2140780, nome:"Isaque Ribeiro Pereira Braga", prod_liq:94, util:68.72, unidades:146},
  {id:2111214, nome:"Maxwell Duarte Soares", prod_liq:97, util:69.58, unidades:350},
  {id:2111210, nome:"Kamilly Vitoria De Oliveira Pereira", prod_liq:105, util:70.37, unidades:376},
  {id:2140781, nome:"Juliana Barreiros Dos Santos Salomao", prod_liq:0, util:0.0, unidades:0},
  {id:2140788, nome:"Maria Eloiza Da Silva Santos", prod_liq:112, util:56.72, unidades:327},
  {id:2027417, nome:"Viviane Leal Liberato Da Silva", prod_liq:0, util:0.0, unidades:0},
  {id:2027311, nome:"Andressa Gomes Da Silva", prod_liq:0, util:0.0, unidades:0},
  {id:2027341, nome:"Kamille Almeida De Freitas", prod_liq:101, util:75.34, unidades:209},
  {id:2140772, nome:"Clara Xavier Viana", prod_liq:0, util:0.0, unidades:0},
];

function getCategory(d) {
  if (d.prod_liq === 0)              return 'none';
  if (d.prod_liq >= META_RK)         return 'meta';
  if (d.prod_liq >= META_RK * 0.80)  return 'attn';
  return 'below';
}
function getBarColor(cat){
  if(cat==='meta')  return '#43a047';
  if(cat==='attn')  return '#fb8c00';
  if(cat==='below') return '#e53935';
  return '#bdbdbd';
}
function getUtilClass(cat){
  if(cat==='meta')  return 'util-green';
  if(cat==='attn')  return 'util-amber';
  if(cat==='below') return 'util-red';
  return 'util-gray';
}
function getProdBadge(cat){
  if(cat==='meta')  return '<span class="prod-badge pb-meta">▲ META</span>';
  if(cat==='attn')  return '<span class="prod-badge pb-attn">▲ ATN</span>';
  if(cat==='below') return '<span class="prod-badge pb-below">▼ ABAIXO</span>';
  return '';
}

let activeTab = 'all', searchQ = '';

function getFiltered(){
  let data = [...raw].sort((a,b) => b.prod_liq - a.prod_liq);
  if(activeTab==='meta')  data = data.filter(d => getCategory(d)==='meta');
  if(activeTab==='attn')  data = data.filter(d => getCategory(d)==='attn');
  if(activeTab==='below') data = data.filter(d => getCategory(d)==='below');
  if(activeTab==='none')  data = data.filter(d => getCategory(d)==='none');
  if(searchQ){
    const q = searchQ.toLowerCase();
    data = data.filter(d => d.nome.toLowerCase().includes(q) || String(d.id).includes(q));
  }
  return data;
}

function buildSummary(){
  const meta    = META_RK;
  const attnMin = Math.round(meta * 0.80);
  const total   = raw.length;
  const comProd = raw.filter(d => d.prod_liq > 0).length;
  const nMeta   = raw.filter(d => getCategory(d)==='meta').length;
  const nAttn   = raw.filter(d => getCategory(d)==='attn').length;
  const nBelow  = raw.filter(d => getCategory(d)==='below').length;
  const nNone   = raw.filter(d => getCategory(d)==='none').length;
  const totalUni= raw.reduce((s,d) => s + d.unidades, 0);
  const somaProds = raw.filter(d => d.prod_liq > 0).reduce((s,d) => s + d.prod_liq, 0);
  const mediaProd = comProd > 0 ? Math.round(somaProds / comProd) : 0;
  const mediaColor = mediaProd >= meta ? 'green' : mediaProd >= meta*0.8 ? 'amber' : 'red';

  document.getElementById('summary-row').innerHTML=`
    <div class="card"><div class="card-label">Total</div><div class="card-val c-default">${total}</div><div class="card-sub">colaboradores</div></div>
    <div class="card"><div class="card-label">Com Produção</div><div class="card-val c-default">${comProd}</div><div class="card-sub">ativos no turno</div></div>
    <div class="card border-green"><div class="card-label">Acima da Meta</div><div class="card-val c-green">${nMeta}</div><div class="card-sub">prod ≥ ${meta}</div></div>
    <div class="card border-amber"><div class="card-label">Atenção</div><div class="card-val c-amber">${nAttn}</div><div class="card-sub">prod ${attnMin}–${meta-1}</div></div>
    <div class="card border-red"><div class="card-label">Abaixo</div><div class="card-val c-red">${nBelow}</div><div class="card-sub">prod &lt; ${attnMin}</div></div>
    <div class="card border-blue"><div class="card-label">Total Unidades</div><div class="card-val c-blue">${totalUni.toLocaleString('pt-BR')}</div><div class="card-sub">no turno</div></div>
    <div class="card border-${mediaColor}"><div class="card-label">Média Produtiva</div><div class="card-val c-${mediaColor}">${mediaProd}</div><div class="card-sub">un/h · ${comProd} produtores</div></div>`;

  document.getElementById('legend-meta').textContent  = `≥ ${meta} — meta`;
  document.getElementById('legend-attn').textContent  = `${attnMin}–${meta-1} — atenção`;
  document.getElementById('legend-below').textContent = `< ${attnMin} — abaixo`;
}

function buildTabs(){
  const counts = {
    all:   raw.length,
    meta:  raw.filter(d=>getCategory(d)==='meta').length,
    attn:  raw.filter(d=>getCategory(d)==='attn').length,
    below: raw.filter(d=>getCategory(d)==='below').length,
    none:  raw.filter(d=>getCategory(d)==='none').length
  };
  const tabs = [{key:'all',label:'Todos'},{key:'meta',label:'Acima da Meta'},{key:'attn',label:'Atenção'},{key:'below',label:'Abaixo'},{key:'none',label:'Sem Produção'}];
  document.getElementById('filter-tabs').innerHTML = tabs.map(t =>
    `<div class="ftab ${activeTab===t.key?'active':''}" data-tab="${t.key}">${t.label} <span class="ftab-count">${counts[t.key]}</span></div>`
  ).join('');
  document.querySelectorAll('.ftab').forEach(el => {
    el.addEventListener('click', () => { activeTab = el.dataset.tab; buildTabs(); renderTable(); });
  });
}

function renderTable(){
  const data = getFiltered();
  const tbody = document.getElementById('tbody');
  const mlist = document.getElementById('mobile-list');

  if(!data.length){
    tbody.innerHTML = `<tr><td colspan="5" class="empty-msg td-inner">Nenhum colaborador encontrado.</td></tr>`;
    mlist.innerHTML = `<p class="empty-msg">Nenhum colaborador encontrado.</p>`;
    return;
  }

  const sorted = [...raw].sort((a,b) => b.prod_liq - a.prod_liq);
  const rankMap = {};
  sorted.filter(d => d.prod_liq > 0).forEach((d,i) => { rankMap[d.id] = i+1; });
  const maxProd = Math.max(...raw.map(d => d.prod_liq), 1);

  tbody.innerHTML = data.map(d => {
    const cat = getCategory(d);
    const rk  = rankMap[d.id];
    let badge;
    if(!rk)         badge = `<span class="rank-badge rank-n">—</span>`;
    else if(rk===1) badge = `<span class="rank-badge rank-1">1</span>`;
    else if(rk===2) badge = `<span class="rank-badge rank-2">2</span>`;
    else if(rk===3) badge = `<span class="rank-badge rank-3">3</span>`;
    else            badge = `<span class="rank-badge rank-n">${rk}</span>`;
    const barW = d.prod_liq > 0 ? Math.min(100,(d.prod_liq/maxProd)*100).toFixed(1) : 0;
    const rowCls = cat==='meta' ? 'row-meta' : '';
    const utilDisplay  = d.util > 0 ? d.util.toFixed(2)+'%' : '—';
    const unitsDisplay = d.unidades > 0 ? d.unidades.toLocaleString('pt-BR') : '—';
    return `<tr class="${rowCls}">
      <td><div class="td-inner">${badge}</div></td>
      <td><div class="td-inner">
        <div class="td-nome">${d.id}</div>
      </div></td>
      <td><div class="td-inner"><div class="prod-wrap">
        <div class="prod-bar-bg"><div class="prod-bar-fill" style="width:${barW}%;background:${getBarColor(cat)};"></div></div>
        <span class="prod-val" style="color:${getBarColor(cat)};">${d.prod_liq > 0 ? d.prod_liq : '—'}</span>
        ${getProdBadge(cat)}
      </div></div></td>
      <td class="right"><div class="td-inner"><span class="util-val ${getUtilClass(cat)}">${utilDisplay}</span></div></td>
      <td class="right"><div class="td-inner" style="font-weight:700;">${unitsDisplay}</div></td>
    </tr>`;
  }).join('');

  mlist.innerHTML = data.map(d => {
    const cat = getCategory(d);
    const rk  = rankMap[d.id];
    let badge;
    if(!rk)         badge = `<span class="rank-badge rank-n">—</span>`;
    else if(rk===1) badge = `<span class="rank-badge rank-1">1</span>`;
    else if(rk===2) badge = `<span class="rank-badge rank-2">2</span>`;
    else if(rk===3) badge = `<span class="rank-badge rank-3">3</span>`;
    else            badge = `<span class="rank-badge rank-n">${rk}</span>`;
    const barW = d.prod_liq > 0 ? Math.min(100,(d.prod_liq/maxProd)*100).toFixed(1) : 0;
    const barColor = getBarColor(cat);
    const utilDisplay  = d.util > 0 ? d.util.toFixed(2)+'%' : '—';
    const unitsDisplay = d.unidades > 0 ? d.unidades.toLocaleString('pt-BR') : '—';
    const rowCls = cat==='meta' ? 'row-meta' : '';
    return `<div class="mcard ${rowCls}">
      <div class="mcard-rank">${badge}</div>
      <div class="mcard-body">
        <div class="mcard-id">${d.id}</div>
        <div class="mcard-bar-row">
          <div class="mcard-bar-bg"><div class="mcard-bar-fill" style="width:${barW}%;background:${barColor};"></div></div>
          <span class="mcard-prod-val" style="color:${barColor};">${d.prod_liq > 0 ? d.prod_liq : '—'}</span>
          ${getProdBadge(cat)}
        </div>
        <div class="mcard-meta-row">
          <div class="mcard-stat">
            <span class="mcard-stat-label">Utilização</span>
            <span class="mcard-stat-val ${getUtilClass(cat)}">${utilDisplay}</span>
          </div>
          <div class="mcard-divider"></div>
          <div class="mcard-stat">
            <span class="mcard-stat-label">Unidades</span>
            <span class="mcard-stat-val">${unitsDisplay}</span>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

document.getElementById('search-input').addEventListener('input', e => { searchQ = e.target.value.trim(); renderTable(); });

buildSummary(); buildTabs(); renderTable();
</script>
</body>
</html>
